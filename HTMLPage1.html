    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
         * {
             margin: 0;
             padding: 0;
             box-sizing: border-box;
         }

         html {
             height: 100%;
             overflow: hidden;
         }

         body {
             font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
             min-height: 100%;
             display: flex;
             align-items: center;
             justify-content: center;
             background: var(--bg-color, #050505);
             color: #e0e0e0;
             overflow: hidden;
             -webkit-font-smoothing: antialiased;
             -moz-osx-font-smoothing: grayscale;
         }

         #particles {
             position: fixed;
             top: 0;
             left: 0;
             width: 100%;
             height: 100%;
             z-index: 1;
             pointer-events: none;
         }

         /* Reserve layout space for #app to prevent CLS when profile card renders */
         #app {
             z-index: 2;
             position: relative;
             contain: layout style;
             display: flex;
             flex-direction: column;
             align-items: center;
         }

         .bg-image {
             position: fixed;
             top: 0;
             left: 0;
             width: 100%;
             height: 100%;
             background-size: cover;
             background-position: center;
             z-index: 0;
             opacity: 0.15;
         }

         /* ── Background image animations ── */
         .bg-anim-bounce {
             width: 140%;
             height: 140%;
             top: -20%;
             left: -20%;
             animation: bgBounce var(--bg-anim-duration, 12s) ease-in-out infinite;
         }

         @keyframes bgBounce {
             0% {
                 transform: translate(0, 0) rotate(0deg);
             }

             25% {
                 transform: translate(10%, -8%) rotate(3deg);
             }

             50% {
                 transform: translate(-5%, 10%) rotate(-2deg);
             }

             75% {
                 transform: translate(-10%, -5%) rotate(4deg);
             }

             100% {
                 transform: translate(0, 0) rotate(0deg);
             }
         }

         .bg-anim-drift {
             width: 130%;
             height: 130%;
             top: -15%;
             left: -15%;
             animation: bgDrift var(--bg-anim-duration, 20s) ease-in-out infinite;
         }

         @keyframes bgDrift {
             0% {
                 transform: translate(0, 0);
             }

             33% {
                 transform: translate(8%, -5%);
             }

             66% {
                 transform: translate(-6%, 8%);
             }

             100% {
                 transform: translate(0, 0);
             }
         }

         .bg-anim-zoom {
             animation: bgZoom var(--bg-anim-duration, 10s) ease-in-out infinite;
         }

         @keyframes bgZoom {
             0%, 100% {
                 transform: scale(1);
             }

             50% {
                 transform: scale(1.15);
             }
         }

         .bg-anim-spin {
             width: 150%;
             height: 150%;
             top: -25%;
             left: -25%;
             animation: bgSpin var(--bg-anim-duration, 60s) linear infinite;
         }

         @keyframes bgSpin {
             from {
                 transform: rotate(0deg);
             }

             to {
                 transform: rotate(360deg);
             }
         }

         .bg-anim-infinity {
             width: 140%;
             height: 140%;
             top: -20%;
             left: -20%;
             animation: bgInfinity var(--bg-anim-duration, 14s) ease-in-out infinite;
         }

         @keyframes bgInfinity {
             0% {
                 transform: translate(0, 0) rotate(0deg);
             }

             12.5% {
                 transform: translate(10%, -6%) rotate(5deg);
             }

             25% {
                 transform: translate(8%, 6%) rotate(0deg);
             }

             37.5% {
                 transform: translate(0, 0) rotate(-5deg);
             }

             50% {
                 transform: translate(-10%, -6%) rotate(0deg);
             }

             62.5% {
                 transform: translate(-8%, 6%) rotate(5deg);
             }

             75% {
                 transform: translate(0, 0) rotate(0deg);
             }

             87.5% {
                 transform: translate(5%, -3%) rotate(-3deg);
             }

             100% {
                 transform: translate(0, 0) rotate(0deg);
             }
         }

         .bg-anim-parallax-scroll {
             width: 100%;
             height: 200%;
             top: 0;
             left: 0;
             animation: bgParallaxScroll var(--bg-anim-duration, 30s) linear infinite;
         }

         @keyframes bgParallaxScroll {
             from {
                 transform: translateY(0);
             }

             to {
                 transform: translateY(-50%);
             }
         }

         .bg-anim-pulse {
             animation: bgPulse var(--bg-anim-duration, 6s) ease-in-out infinite;
         }

         @keyframes bgPulse {
             0%, 100% {
                 opacity: var(--bg-pulse-lo, 0.08);
                 transform: scale(1);
             }

             50% {
                 opacity: var(--bg-pulse-hi, 0.25);
                 transform: scale(1.03);
             }
         }

         .bg-anim-shake {
             animation: bgShake var(--bg-anim-duration, 0.4s) ease-in-out infinite;
         }

         @keyframes bgShake {
             0%, 100% {
                 transform: translate(0, 0);
             }

             25% {
                 transform: translate(2px, -2px);
             }

             50% {
                 transform: translate(-2px, 2px);
             }

             75% {
                 transform: translate(2px, 1px);
             }
         }

         .bg-anim-kenburns {
             width: 130%;
             height: 130%;
             top: -15%;
             left: -15%;
             animation: bgKenBurns var(--bg-anim-duration, 25s) ease-in-out infinite alternate;
         }

         @keyframes bgKenBurns {
             0% {
                 transform: scale(1) translate(0, 0);
             }

             100% {
                 transform: scale(1.2) translate(-5%, -3%);
             }
         }

         .bg-gradient {
             position: fixed;
             top: -50%;
             left: -50%;
             width: 200%;
             height: 200%;
             background: radial-gradient(circle at 30% 50%, rgba(var(--accent-rgb, 120, 40, 200), 0.1) 0%, transparent 50%), radial-gradient(circle at 70% 50%, rgba(var(--accent-rgb, 120, 40, 200), 0.06) 0%, transparent 50%);
             animation: bgShift 15s ease-in-out infinite alternate;
             z-index: 0;
         }

         @keyframes bgShift {
             0% {
                 transform: translate(0, 0) rotate(0deg);
             }

             100% {
                 transform: translate(-5%, 3%) rotate(3deg);
             }
         }

         /* Top nav */
         .top-nav {
             position: fixed;
             top: 0;
             left: 0;
             right: 0;
             display: flex;
             align-items: center;
             justify-content: center;
             gap: 1rem;
             padding: 18px 0;
             z-index: 60;
             pointer-events: none;
             animation: fadeDown 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
         }

             .top-nav a {
                 color: rgba(255,255,255,0.2);
                 text-decoration: none;
                 font-size: 0.72rem;
                 font-weight: 500;
                 letter-spacing: 0.04em;
                 pointer-events: auto;
                 transition: color 0.3s ease;
             }

                 .top-nav a:hover {
                     color: rgba(255,255,255,0.55);
                 }

             .top-nav .nav-sep {
                 color: rgba(255,255,255,0.1);
                 font-size: 0.7rem;
                 user-select: none;
             }

         @keyframes fadeDown {
             from {
                 opacity: 0;
                 transform: translateY(-8px);
             }

             to {
                 opacity: 1;
                 transform: translateY(0);
             }
         }

         /* Legacy .landing class removed — replaced by .landing-layout + .landing-hero */

         @keyframes twLineHint {
             0% {
                 transform: scaleX(0);
                 transform-origin: left;
             }

             15% {
                 transform: scaleX(1);
                 transform-origin: left;
             }

             30% {
                 transform: scaleX(1);
                 transform-origin: right;
             }

             45% {
                 transform: scaleX(0);
                 transform-origin: right;
             }

             100% {
                 transform: scaleX(0);
                 transform-origin: right;
             }
         }

         /* Profile dock (featured profiles only) */
         .dock {
             position: fixed;
             bottom: 28px;
             left: 50%;
             transform: translateX(-50%);
             display: flex;
             align-items: center;
             width: fit-content;
             max-width: calc(100vw - 48px);
             padding: 8px 16px;
             border-radius: 20px;
             background: rgba(255,255,255,0.04);
             border: 1px solid rgba(255,255,255,0.08);
             backdrop-filter: blur(16px) saturate(150%);
             -webkit-backdrop-filter: blur(16px) saturate(150%);
             z-index: 50;
             animation: dockFadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
             overflow-x: auto;
             overflow-y: hidden;
             scrollbar-width: none;
         }

             .dock::-webkit-scrollbar {
                 display: none;
             }

         @keyframes dockFadeUp {
             from {
                 opacity: 0;
                 transform: translateX(-50%) translateY(30px);
             }

             to {
                 opacity: 1;
                 transform: translateX(-50%) translateY(0);
             }
         }

         .dock-avatar {
             position: relative;
             width: 34px;
             height: 34px;
             border-radius: 50%;
             cursor: pointer;
             display: flex;
             align-items: center;
             justify-content: center;
             text-decoration: none;
             flex-shrink: 0;
             margin-left: 10px;
         }

             .dock-avatar:first-child {
                 margin-left: 0;
             }

             .dock-avatar::before {
                 content: '';
                 position: absolute;
                 inset: -2px;
                 border-radius: 50%;
                 border: 1.5px solid transparent;
                 transition: border-color 0.35s ease, box-shadow 0.35s ease;
             }

             .dock-avatar:hover::before {
                 border-color: rgba(255,255,255,0.5);
                 box-shadow: 0 0 10px rgba(255,255,255,0.15), inset 0 0 6px rgba(255,255,255,0.05);
             }

             .dock-avatar img {
                 width: 100%;
                 height: 100%;
                 border-radius: 50%;
                 object-fit: cover;
                 opacity: 0.7;
                 transition: opacity 0.35s ease;
             }

             .dock-avatar:hover img {
                 opacity: 1;
             }

         .dock-tooltip {
             position: absolute;
             bottom: calc(100% + 10px);
             left: 50%;
             transform: translateX(-50%) translateY(4px);
             background: rgba(0,0,0,0.75);
             color: #e5e5e7;
             font-size: 0.65rem;
             font-weight: 500;
             letter-spacing: 0.02em;
             padding: 4px 8px;
             border-radius: 6px;
             white-space: nowrap;
             pointer-events: none;
             opacity: 0;
             transition: opacity 0.2s ease, transform 0.2s ease;
             backdrop-filter: blur(8px);
         }

         .dock-avatar:hover .dock-tooltip {
             opacity: 1;
             transform: translateX(-50%) translateY(0);
         }

         .dock-expand {
             position: relative;
             width: 34px;
             height: 34px;
             border-radius: 50%;
             cursor: pointer;
             display: flex;
             align-items: center;
             justify-content: center;
             background: rgba(255,255,255,0.06);
             border: 1.5px solid rgba(255,255,255,0.12);
             color: rgba(255,255,255,0.5);
             font-size: 1.2rem;
             line-height: 1;
             transition: background 0.25s ease, border-color 0.25s ease, color 0.25s ease;
             flex-shrink: 0;
             margin-left: 10px;
         }

             .dock-expand:hover {
                 background: rgba(255,255,255,0.1);
                 border-color: rgba(255,255,255,0.3);
                 color: rgba(255,255,255,0.9);
             }

             .dock-expand .dock-expand-icon {
                 display: flex;
                 align-items: center;
                 justify-content: center;
                 width: 100%;
                 height: 100%;
                 transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
             }

             .dock-expand.open .dock-expand-icon {
                 transform: rotate(45deg);
             }

             .dock-expand:hover .dock-tooltip {
                 opacity: 1;
                 transform: translateX(-50%) translateY(0);
             }

         .dock-divider {
             width: 1px;
             height: 20px;
             background: rgba(255,255,255,0.1);
             flex-shrink: 0;
             opacity: 0;
             overflow: hidden;
             margin: 0;
             padding: 0;
             width: 0;
             transition: opacity 0.3s ease, width 0.3s ease, margin 0.3s ease;
         }

             .dock-divider.visible {
                 opacity: 1;
                 width: 1px;
                 margin: 0 10px;
             }

         .dock-extra {
             display: flex;
             align-items: center;
             overflow: hidden;
             max-width: 0;
             transition: max-width 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
             opacity: 0;
         }

             .dock-extra.open {
                 max-width: none;
                 opacity: 1;
                 overflow: visible;
             }

             .dock-extra .dock-avatar {
                 opacity: 0;
                 transform: scale(0.5);
                 margin-left: 10px;
                 transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
             }

                 .dock-extra .dock-avatar:first-child {
                     margin-left: 0;
                 }

             .dock-extra.open .dock-avatar {
                 opacity: 1;
                 transform: scale(1);
             }

         /* ── Profile carousel (3-row marquee, inline in landing layout) ── */
         .profile-carousel {
             width: 100%;
             max-width: 720px;
             display: flex;
             flex-direction: column;
             gap: 5px;
             padding: 8px 0;
             mask-image: linear-gradient(to right, transparent 0%, black 5%, black 95%, transparent 100%);
             -webkit-mask-image: linear-gradient(to right, transparent 0%, black 5%, black 95%, transparent 100%);
             opacity: 0;
             transform: translateY(20px);
             animation: carouselFadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
         }

         @keyframes carouselFadeUp {
             to {
                 opacity: 1;
                 transform: translateY(0);
             }
         }

         .carousel-row {
             overflow: hidden;
             padding: 6px 0;
         }

         .carousel-track {
             display: flex;
             gap: 8px;
             width: max-content;
             animation: marquee 60s linear infinite;
             will-change: transform;
         }

         .carousel-row:hover .carousel-track {
             animation-play-state: paused;
         }

         .carousel-row:nth-child(1) .carousel-track {
             animation-duration: 60s;
         }

         .carousel-row:nth-child(2) .carousel-track {
             animation-duration: 45s;
             animation-direction: reverse;
         }

         .carousel-row:nth-child(3) .carousel-track {
             animation-duration: 55s;
         }

         @keyframes marquee {
             from {
                 transform: translateX(0);
             }

             to {
                 transform: translateX(-50%);
             }
         }

         .carousel-item {
             display: flex;
             align-items: center;
             gap: 8px;
             padding: 5px 12px 5px 5px;
             background: rgba(255,255,255,0.03);
             border: 1px solid rgba(255,255,255,0.06);
             border-radius: 10px;
             text-decoration: none;
             color: rgba(255,255,255,0.45);
             font-size: 0.7rem;
             font-weight: 500;
             white-space: nowrap;
             flex-shrink: 0;
             transition: background 0.25s ease, border-color 0.25s ease, color 0.25s ease;
             letter-spacing: 0.01em;
         }

             .carousel-item:hover {
                 background: rgba(255,255,255,0.08);
                 border-color: rgba(255,255,255,0.15);
                 color: rgba(255,255,255,0.85);
             }

             .carousel-item img {
                 width: 24px;
                 height: 24px;
                 border-radius: 50%;
                 object-fit: cover;
                 opacity: 0.7;
                 transition: opacity 0.25s ease;
             }

             .carousel-item:hover img {
                 opacity: 1;
             }
             /* ── Carousel custom effects (scoob tag users) ── */
             .carousel-item[data-custom] {
                 position: relative;
                 overflow: hidden;
             }

             .carousel-item[data-custom] {
                 color: rgba(255,255,255,0.75);
             }

             .carousel-item.ci-shimmer::after {
                 content: '';
                 position: absolute;
                 inset: -50%;
                 background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.12) 45%, rgba(255,255,255,0.18) 50%, rgba(255,255,255,0.12) 55%, transparent 60%);
                 animation: ciShimmer 3s ease-in-out infinite;
                 pointer-events: none;
             }

         @keyframes ciShimmer {
             0% {
                 transform: translateX(-100%);
             }

             100% {
                 transform: translateX(100%);
             }
         }

         .carousel-item.ci-glitch {
             animation: ciGlitch 4s steps(1) infinite;
         }

         @keyframes ciGlitch {
             0%, 94% {
                 transform: none;
                 filter: none;
             }

             95% {
                 transform: translate(-2px, 1px);
                 filter: hue-rotate(90deg);
             }

             96% {
                 transform: translate(2px, -1px);
                 filter: hue-rotate(-90deg);
             }

             97% {
                 transform: translate(-1px, -1px);
                 filter: hue-rotate(45deg);
             }

             98% {
                 transform: translate(1px, 1px);
             }

             100% {
                 transform: none;
                 filter: none;
             }
         }

         .carousel-item.ci-pulse {
             animation: ciPulse 2.5s ease-in-out infinite;
         }

         @keyframes ciPulse {
             0%, 100% {
                 box-shadow: 0 0 0 0 var(--ci-glow, rgba(139,92,246,0.4));
                 transform: scale(1);
             }

             50% {
                 box-shadow: 0 0 14px 5px var(--ci-glow, rgba(139,92,246,0.45));
                 transform: scale(1.04);
             }
         }

         .carousel-item.ci-rainbow {
             border-width: 2px;
             animation: ciRainbow 6s linear infinite;
         }

         @keyframes ciRainbow {
             0% {
                 border-color: #ff6b6b;
                 box-shadow: 0 0 8px rgba(255,107,107,0.3);
             }

             16% {
                 border-color: #ffa07a;
                 box-shadow: 0 0 8px rgba(255,160,122,0.3);
             }

             33% {
                 border-color: #ffd700;
                 box-shadow: 0 0 8px rgba(255,215,0,0.3);
             }

             50% {
                 border-color: #98fb98;
                 box-shadow: 0 0 8px rgba(152,251,152,0.3);
             }

             66% {
                 border-color: #87ceeb;
                 box-shadow: 0 0 8px rgba(135,206,235,0.3);
             }

             83% {
                 border-color: #dda0dd;
                 box-shadow: 0 0 8px rgba(221,160,221,0.3);
             }

             100% {
                 border-color: #ff6b6b;
                 box-shadow: 0 0 8px rgba(255,107,107,0.3);
             }
         }

         .carousel-item.ci-glow {
             box-shadow: 0 0 14px 4px var(--ci-glow, rgba(139,92,246,0.4));
         }

         @media (prefers-reduced-motion: reduce) {
             .carousel-track {
                 animation-play-state: paused;
             }
         }

         /* ── Profile search box ── */
         .profile-search-wrap {
             position: relative;
             width: 100%;
             max-width: 400px;
             z-index: 10;
             opacity: 0;
             transform: translateY(12px);
             animation: carouselFadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
         }

         .profile-search {
             display: flex;
             align-items: center;
             gap: 10px;
             padding: 10px 16px;
             background: rgba(255,255,255,0.03);
             border: 1px solid rgba(255,255,255,0.10);
             border-radius: 14px;
             backdrop-filter: blur(16px) saturate(150%);
             -webkit-backdrop-filter: blur(16px) saturate(150%);
             transition: border-color 0.3s ease, background 0.3s ease;
         }

             .profile-search:focus-within {
                 border-color: rgba(255,255,255,0.2);
                 background: rgba(255,255,255,0.05);
             }

             .profile-search i {
                 color: rgba(255,255,255,0.2);
                 font-size: 0.8rem;
                 flex-shrink: 0;
                 transition: color 0.3s ease;
             }

             .profile-search:focus-within i {
                 color: rgba(255,255,255,0.4);
             }

             .profile-search input {
                 flex: 1;
                 background: none;
                 border: none;
                 outline: none;
                 color: rgba(255,255,255,0.7);
                 font-family: inherit;
                 font-size: 0.8rem;
                 font-weight: 400;
                 letter-spacing: 0.01em;
             }

                 .profile-search input::placeholder {
                     color: rgba(255,255,255,0.18);
                 }

         .search-results {
             position: absolute;
             top: calc(100% + 6px);
             left: 0;
             right: 0;
             background: rgba(12,12,12,0.92);
             border: 1px solid rgba(255,255,255,0.08);
             border-radius: 14px;
             backdrop-filter: blur(20px) saturate(150%);
             -webkit-backdrop-filter: blur(20px) saturate(150%);
             overflow: hidden;
             opacity: 0;
             transform: translateY(-4px);
             pointer-events: none;
             transition: opacity 0.2s ease, transform 0.2s ease;
         }

             .search-results.open {
                 opacity: 1;
                 transform: translateY(0);
                 pointer-events: auto;
             }

         .search-result {
             display: flex;
             align-items: center;
             gap: 10px;
             padding: 9px 14px;
             text-decoration: none;
             color: rgba(255,255,255,0.5);
             font-size: 0.78rem;
             font-weight: 500;
             transition: background 0.2s ease, color 0.2s ease;
         }

             .search-result:hover {
                 background: rgba(255,255,255,0.06);
                 color: rgba(255,255,255,0.85);
             }

             .search-result img {
                 width: 26px;
                 height: 26px;
                 border-radius: 50%;
                 object-fit: cover;
                 opacity: 0.7;
             }

             .search-result:hover img {
                 opacity: 1;
             }

         .search-result-name {
             opacity: 0.4;
             font-size: 0.68rem;
             margin-left: auto;
         }

         .search-result:hover .search-result-name {
             opacity: 0.6;
         }

         .search-no-results {
             padding: 12px 14px;
             color: rgba(255,255,255,0.2);
             font-size: 0.75rem;
             text-align: center;
         }

         .profile {
             text-align: center;
             z-index: 1;
             position: relative;
             max-width: 440px;
             width: 440px;
             padding: 2.5rem 1.5rem;
             font-family: var(--profile-font, 'Inter', -apple-system, BlinkMacSystemFont, sans-serif);
             animation: var(--card-anim, fadeUp) 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
             overflow: hidden;
             contain: layout style;
         }

             .profile.anim-none {
                 animation: none;
             }

             .profile.card-bg {
                 max-width: 520px;
                 min-width: 480px;
                 background: var(--card-bg, rgba(255,255,255,0.04));
                 border: 1px solid var(--card-border, rgba(255,255,255,0.08));
                 border-radius: var(--card-radius, 24px);
                 backdrop-filter: blur(var(--card-blur, 20px)) saturate(150%);
                 -webkit-backdrop-filter: blur(var(--card-blur, 20px)) saturate(150%);
                 box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
                 padding: 3rem 2.5rem;
                 overflow: hidden;
             }

         /* ── Card border effects (only with card-bg) ── */
         @property --card-border-angle {
             syntax: '<angle>';
             initial-value: 0deg;
             inherits: false;
         }

         .profile.card-bg.border-chase {
             border-color: transparent;
         }

             .profile.card-bg.border-chase::before {
                 content: '';
                 position: absolute;
                 inset: 0;
                 border-radius: inherit;
                 padding: 1px;
                 background: conic-gradient( from var(--card-border-angle), transparent 0%, var(--card-border-effect-color, var(--accent-color, #8b5cf6)) 10%, transparent 37%, transparent 50%, var(--card-border-effect-color, var(--accent-color, #8b5cf6)) 60%, transparent 87% );
                 -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
                 mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
                 -webkit-mask-composite: xor;
                 mask-composite: exclude;
                 animation: cardBorderChase 4s linear infinite;
                 opacity: 0.6;
                 pointer-events: none;
                 z-index: 999;
             }

         @keyframes cardBorderChase {
             to {
                 --card-border-angle: 360deg;
             }
         }

         .profile.card-bg.border-pulse {
             border-color: transparent;
         }

             .profile.card-bg.border-pulse::before {
                 content: '';
                 position: absolute;
                 inset: 0;
                 border-radius: inherit;
                 padding: 2px;
                 background: var(--card-border-effect-color, var(--accent-color, #8b5cf6));
                 -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
                 mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
                 -webkit-mask-composite: xor;
                 mask-composite: exclude;
                 animation: cardBorderPulse 2s ease-in-out infinite;
                 pointer-events: none;
                 z-index: 999;
             }

         @keyframes cardBorderPulse {
             0%, 100% {
                 opacity: 0.3;
             }

             50% {
                 opacity: 1;
             }
         }

         /* ── Profile Widget (inherits card layout) ── */

         /* ── 3D Card tilt ── */
         .profile.card-tilt {
             transform-style: preserve-3d;
             transition: transform 0.15s ease-out, box-shadow 0.3s ease;
             /* overflow:hidden and clip-path both flatten the 3D context and clip
          translateZ children at the card edge — override both when tilt is on */
             overflow: visible;
         }

             .profile.card-tilt .avatar-wrapper,
             .profile.card-tilt .display-name,
             .profile.card-tilt .links {
                 transform: translateZ(30px);
             }

             .profile.card-tilt .bio,
             .profile.card-tilt .username,
             .profile.card-tilt .socials {
                 transform: translateZ(15px);
             }
         /* ── Bass bounce (audio-reactive scale) ── */
         .profile.bass-bounce {
             will-change: scale;
             transform-origin: center center;
         }

         @media (max-width: 540px) {
             .profile.card-bg {
                 min-width: 0;
                 max-width: 100%;
             }
         }

         @keyframes fadeUp {
             from {
                 opacity: 0;
                 transform: translateY(30px) scale(0.98);
             }

             to {
                 opacity: 1;
                 transform: translateY(0) scale(1);
             }
         }

         @keyframes slideLeft {
             from {
                 opacity: 0;
                 transform: translateX(-60px) scale(0.97);
             }

             to {
                 opacity: 1;
                 transform: translateX(0) scale(1);
             }
         }

         @keyframes slideRight {
             from {
                 opacity: 0;
                 transform: translateX(60px) scale(0.97);
             }

             to {
                 opacity: 1;
                 transform: translateX(0) scale(1);
             }
         }

         @keyframes scaleIn {
             from {
                 opacity: 0;
                 transform: scale(0.6);
             }

             to {
                 opacity: 1;
                 transform: scale(1);
             }
         }

         @keyframes glitchIn {
             0% {
                 opacity: 0;
                 transform: translate(-6px, 3px) skewX(-8deg);
                 filter: blur(4px);
             }

             20% {
                 opacity: 0.6;
                 transform: translate(4px, -2px) skewX(4deg);
                 filter: blur(2px);
             }

             40% {
                 opacity: 0.8;
                 transform: translate(-2px, 1px) skewX(-2deg);
                 filter: blur(1px);
             }

             60% {
                 opacity: 0.9;
                 transform: translate(1px, 0) skewX(1deg);
                 filter: blur(0);
             }

             100% {
                 opacity: 1;
                 transform: translate(0) skewX(0);
                 filter: blur(0);
             }
         }

         @keyframes blurIn {
             from {
                 opacity: 0;
                 filter: blur(20px);
                 transform: scale(1.04);
             }

             to {
                 opacity: 1;
                 filter: blur(0);
                 transform: scale(1);
             }
         }

         /* ── Card Appear: staggered child entrance ── */
         @keyframes caFadeIn {
             from {
                 opacity: 0;
                 transform: translateY(12px);
             }

             to {
                 opacity: 1;
                 transform: translateY(0);
             }
         }

         @keyframes caPopIn {
             0% {
                 opacity: 0;
                 transform: scale(0.88);
             }

             70% {
                 opacity: 1;
                 transform: scale(1.02);
             }

             100% {
                 opacity: 1;
                 transform: scale(1);
             }
         }

         @keyframes caSlideUp {
             from {
                 opacity: 0;
                 transform: translateY(18px) scale(0.98);
             }

             to {
                 opacity: 1;
                 transform: translateY(0) scale(1);
             }
         }

         @keyframes caGlitchIn {
             0% {
                 opacity: 0;
                 transform: translate(0) skewX(0);
                 filter: blur(6px) brightness(2);
                 clip-path: inset(0 100% 0 0);
             }

             15% {
                 opacity: 0.4;
                 transform: translate(8px, -3px) skewX(-6deg);
                 filter: blur(3px) brightness(1.5);
                 clip-path: inset(0 40% 0 0);
             }

             30% {
                 opacity: 0.6;
                 transform: translate(-5px, 2px) skewX(4deg);
                 filter: blur(2px) brightness(1.2);
                 clip-path: inset(0 20% 0 0);
             }

             50% {
                 opacity: 0.8;
                 transform: translate(3px, -1px) skewX(-2deg);
                 filter: blur(1px) brightness(1.1);
                 clip-path: inset(0 5% 0 0);
             }

             70% {
                 opacity: 0.9;
                 transform: translate(-1px, 0) skewX(0.5deg);
                 filter: blur(0) brightness(1);
                 clip-path: inset(0);
             }

             100% {
                 opacity: 1;
                 transform: translate(0) skewX(0);
                 filter: blur(0) brightness(1);
                 clip-path: inset(0);
             }
         }

         @keyframes caTypewriter {
             from {
                 opacity: 0;
                 clip-path: inset(0 100% 0 0);
                 transform: translateX(-6px);
             }

             to {
                 opacity: 1;
                 clip-path: inset(0 0% 0 0);
                 transform: translateX(0);
             }
         }

         @keyframes caElastic {
             0% {
                 opacity: 0;
                 transform: scale(0.5) translateY(20px);
             }

             40% {
                 opacity: 1;
                 transform: scale(1.06) translateY(-4px);
             }

             60% {
                 transform: scale(0.97) translateY(2px);
             }

             80% {
                 transform: scale(1.015) translateY(-1px);
             }

             100% {
                 opacity: 1;
                 transform: scale(1) translateY(0);
             }
         }

         @keyframes caBlurIn {
             from {
                 opacity: 0;
                 filter: blur(16px);
                 transform: scale(1.03);
             }

             to {
                 opacity: 1;
                 filter: blur(0);
                 transform: scale(1);
             }
         }

         .ca-child {
             opacity: 0;
             will-change: transform, opacity;
         }

         .ca-fade {
             animation: caFadeIn var(--ca-dur, 0.55s) cubic-bezier(0.25, 0.46, 0.45, 0.94) var(--ca-del, 0s) both;
         }

         .ca-pop {
             animation: caPopIn var(--ca-dur, 0.5s) cubic-bezier(0.34, 1.4, 0.64, 1) var(--ca-del, 0s) both;
         }

         .ca-slide {
             animation: caSlideUp var(--ca-dur, 0.6s) cubic-bezier(0.25, 0.46, 0.45, 0.94) var(--ca-del, 0s) both;
         }

         .ca-glitch {
             animation: caGlitchIn var(--ca-dur, 0.7s) linear var(--ca-del, 0s) both;
         }

         .ca-typewriter {
             animation: caTypewriter var(--ca-dur, 0.5s) cubic-bezier(0.25, 0.46, 0.45, 0.94) var(--ca-del, 0s) both;
         }

         .ca-elastic {
             animation: caElastic var(--ca-dur, 0.8s) cubic-bezier(0.25, 0.46, 0.45, 0.94) var(--ca-del, 0s) both;
         }

         .ca-blur {
             animation: caBlurIn var(--ca-dur, 0.65s) cubic-bezier(0.25, 0.46, 0.45, 0.94) var(--ca-del, 0s) both;
         }

         @media (prefers-reduced-motion: reduce) {
             .ca-fade, .ca-pop, .ca-slide, .ca-glitch, .ca-typewriter, .ca-elastic, .ca-blur {
                 animation-duration: 0.01s !important;
                 animation-delay: 0s !important;
             }
         }

         .avatar-wrapper {
             position: relative;
             display: inline-flex;
             align-items: center;
             justify-content: center;
             margin-bottom: 1.2rem;
             isolation: isolate;
         }

         .avatar {
             display: block;
             width: 120px;
             height: 120px;
             border-radius: 50%;
             object-fit: cover;
             border: 2px solid rgba(255,255,255,0.08);
             box-shadow: 0 8px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
             transition: transform 0.3s ease, box-shadow 0.3s ease;
             position: relative;
             z-index: 1;
         }
         /* Inside a tilt card, box-shadow doesn't composite correctly in 3D space —
        it stays flat while the avatar translates in Z, producing a misaligned shadow.
        Replace with filter:drop-shadow which is applied after 3D compositing. */
         .card-tilt .avatar {
             box-shadow: none;
             filter: drop-shadow(0 8px 24px rgba(0,0,0,0.5));
         }

         .avatar:hover {
             transform: scale(1.05);

         }

             position: absolute;
             inset: -8%;
             width: 116%;
             height: 116%;
             pointer-events: none;
             z-index: 5;
             object-fit: contain;
             filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));

         .tag-era .tag-particle {
             background: rgba(230,178,38,0.8);
             width: 3px;
             height: 3px;
         }

         .tag-contributor .tag-particle {
             background: rgba(103,234,147,0.8);
             width: 3px;
             height: 3px;
         }

         @keyframes tag-float {
             0% {
                 opacity: 0;
                 transform: translate(var(--tp-x0), var(--tp-y0)) scale(0.5);
             }

             15% {
                 opacity: 0.85;
             }

             50% {
                 transform: translate(var(--tp-x1), var(--tp-y1)) scale(1);
                 opacity: 0.6;
             }

             85% {
                 opacity: 0.3;
             }

             100% {
                 opacity: 0;
                 transform: translate(var(--tp-x2), var(--tp-y2)) scale(0.3);
             }
         }

         /* ── Skill Icons ── */
         .profile-skill-icons {
             display: flex;
             gap: 5px;
             justify-content: center;
             flex-wrap: wrap;
             margin-top: 2px;
             margin-bottom: 0.6rem;
             max-width: 340px;
             margin-left: auto;
             margin-right: auto;
         }

         .profile-skill-icon {
             position: relative;
             width: 28px;
             height: 28px;
             border-radius: 5px;
             transition: transform .15s ease, box-shadow .15s ease;
             cursor: default;
         }

             .profile-skill-icon:hover {
                 transform: scale(1.25);
                 z-index: 2;
             }

             .profile-skill-icon img {
                 width: 100%;
                 height: 100%;
                 border-radius: 5px;
                 display: block;
             }

             .profile-skill-icon::after {
                 content: attr(data-name);
                 position: absolute;
                 bottom: calc(100% + 5px);
                 left: 50%;
                 transform: translateX(-50%);
                 background: rgba(15,15,20,0.95);
                 color: #e0e0e0;
                 padding: 3px 8px;
                 border-radius: 5px;
                 font-size: 11px;
                 font-weight: 600;
                 white-space: nowrap;
                 pointer-events: none;
                 opacity: 0;
                 transition: opacity .15s;
                 border: 1px solid rgba(255,255,255,0.08);
                 z-index: 10;
                 box-shadow: 0 2px 8px rgba(0,0,0,0.3);
             }

             .profile-skill-icon:hover::after {
                 opacity: 1;
             }

         .bio {
             font-size: 0.9rem;
             color: #86868b;
             line-height: 1.6;
             margin-bottom: 2rem;
             font-weight: 300;
             margin-left: auto;
             margin-right: auto;
             letter-spacing: 0.01em;
             white-space: pre-wrap;
             word-wrap: break-word;
             overflow-x: auto;
             overflow-y: hidden;
         }

         .bio-nowrap {
             white-space: nowrap;
             overflow: hidden;
             text-overflow: ellipsis;
         }

         .bio-pre {
             white-space: pre;
             word-wrap: normal;
         }

         .bio-discord-emoji {
             height: 1.4em;
             width: auto;
             vertical-align: -0.3em;
             display: inline;
             object-fit: contain;
         }

         .bio a {
             color: var(--accent-color, #8b5cf6);
             text-decoration: underline;
             text-underline-offset: 2px;
         }

             .bio a:hover {
                 opacity: 0.8;
             }

         .bio strong {
             color: #ccc;
             font-weight: 600;
         }

         .bio em {
             color: #aaa;
         }

         .bio .bio-seg {
             display: inline;
         }

         .bio .bio-seg-gradient {
             display: inline-block;
             background-clip: text;
             -webkit-background-clip: text;
             -webkit-text-fill-color: transparent;
             font-weight: 600;
         }

         .bio .bio-seg-pop {
             display: inline-block;
             transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
             cursor: default;
         }

             .bio .bio-seg-pop:hover {
                 transform: scale(1.18);
             }

         .bio .bio-seg-glow:hover {
             text-shadow: 0 0 8px currentColor, 0 0 16px currentColor;
         }

         .bio .bio-seg-shake {
             display: inline-block;
         }

         @keyframes bioSegShake {
             0%, 100% {
                 transform: translateX(0);
             }

             20% {
                 transform: translateX(-2px) rotate(-1deg);
             }

             40% {
                 transform: translateX(2px) rotate(1deg);
             }

             60% {
                 transform: translateX(-1px) rotate(-0.5deg);
             }

             80% {
                 transform: translateX(1px) rotate(0.5deg);
             }
         }

         .bio .bio-seg-shake:hover {
             animation: bioSegShake 0.4s ease;
         }

         @keyframes bioSegRainbow {
             0% {
                 color: #ff6b6b;
             }

             16% {
                 color: #ffa36b;
             }

             33% {
                 color: #ffd93d;
             }

             50% {
                 color: #6bff8e;
             }

             66% {
                 color: #6bb5ff;
             }

             83% {
                 color: #b56bff;
             }

             100% {
                 color: #ff6b6b;
             }
         }

         .bio .bio-seg-rainbow:hover {
             animation: bioSegRainbow 1s linear infinite;
             -webkit-text-fill-color: unset;
         }

         .bio .bio-seg-changeText .bio-seg-alt {
             display: none;
         }

         .bio .bio-seg-changeText .bio-seg-orig {
             display: inline;
         }

         .bio .bio-seg-changeText:hover .bio-seg-alt {
             display: inline;
         }

         .bio .bio-seg-changeText:hover .bio-seg-orig {
             display: none;
         }

         /* Multiword rotator */
         .bio .bio-seg-multiword {
             display: inline-block;
             position: relative;
             vertical-align: baseline;
             overflow: clip;
         }

             .bio .bio-seg-multiword .mw-word {
                 display: inline-block;
             }

                 .bio .bio-seg-multiword .mw-word.mw-enter {
                     opacity: 1;
                     transform: none;
                     transition: opacity 0.35s, transform 0.35s;
                 }

                 .bio .bio-seg-multiword .mw-word.mw-exit {
                     position: absolute;
                     left: 0;
                     top: 0;
                     opacity: 0;
                     pointer-events: none;
                     transition: opacity 0.35s, transform 0.35s;
                 }

                 .bio .bio-seg-multiword .mw-word.mw-enter-init {
                     opacity: 0;
                 }
             /* fade — just opacity */
             .bio .bio-seg-multiword.mw-anim-fade .mw-word.mw-exit {
                 opacity: 0;
             }

             .bio .bio-seg-multiword.mw-anim-fade .mw-word.mw-enter-init {
                 opacity: 0;
             }
             /* swipe-up */
             .bio .bio-seg-multiword.mw-anim-swipeUp .mw-word.mw-exit {
                 opacity: 0;
                 transform: translateY(-100%);
             }

             .bio .bio-seg-multiword.mw-anim-swipeUp .mw-word.mw-enter-init {
                 opacity: 0;
                 transform: translateY(100%);
             }
             /* swipe-down */
             .bio .bio-seg-multiword.mw-anim-swipeDown .mw-word.mw-exit {
                 opacity: 0;
                 transform: translateY(100%);
             }

             .bio .bio-seg-multiword.mw-anim-swipeDown .mw-word.mw-enter-init {
                 opacity: 0;
                 transform: translateY(-100%);
             }
         /* shake */
         @keyframes mwShakeIn {
             0% {
                 transform: translateX(-6px);
                 opacity: 0;
             }

             25% {
                 transform: translateX(4px);
             }

             50% {
                 transform: translateX(-2px);
             }

             75% {
                 transform: translateX(1px);
             }

             100% {
                 transform: translateX(0);
                 opacity: 1;
             }
         }

         .bio .bio-seg-multiword.mw-anim-shake .mw-word.mw-enter-active {
             animation: mwShakeIn 0.4s ease forwards;
         }

         .bio .bio-seg-multiword.mw-anim-shake .mw-word.mw-exit {
             opacity: 0;
         }

         /* Location */
         .location {
             font-size: 0.8rem;
             color: #86868b;
             font-weight: 400;
             margin-bottom: 1rem;
             letter-spacing: 0.01em;
             display: flex;
             align-items: center;
             justify-content: center;
             gap: 0.4rem;
         }

             .location i {
                 font-size: 0.7rem;
                 opacity: 0.6;
             }

         /* ── Nameplate effects ── */
         .name-gradient {
             background: linear-gradient(90deg, var(--name-g1, #ff6b6b), var(--name-g2, #4ecdc4), var(--name-g3, #45b7d1), var(--name-g1, #ff6b6b));
             background-size: 300% 100%;
             -webkit-background-clip: text;
             background-clip: text;
             -webkit-text-fill-color: transparent;
             animation: nameGradientShift 4s ease infinite;
         }

         @keyframes nameGradientShift {
             0% {
                 background-position: 0% 50%;
             }

             50% {
                 background-position: 100% 50%;
             }

             100% {
                 background-position: 0% 50%;
             }
         }

         .name-glow {
             animation: nameGlowPulse 2.5s ease-in-out infinite;
         }

         @keyframes nameGlowPulse {
             0%, 100% {
                 text-shadow: 0 0 10px rgba(var(--accent-rgb, 120,40,200), 0.4), 0 0 20px rgba(var(--accent-rgb, 120,40,200), 0.2);
             }

             50% {
                 text-shadow: 0 0 20px rgba(var(--accent-rgb, 120,40,200), 0.8), 0 0 40px rgba(var(--accent-rgb, 120,40,200), 0.4), 0 0 60px rgba(var(--accent-rgb, 120,40,200), 0.2);
             }
         }

         .name-typewriter {
             overflow: hidden;
             white-space: nowrap;
             border-right: 2px solid rgba(var(--accent-rgb, 120,40,200), 0.8);
             display: inline-block;
             width: 0;
             animation: nameTypewriter 2s steps(var(--tw-steps, 10), end) forwards, nameTypeCaret 0.6s step-end infinite;
         }

         @keyframes nameTypewriter {
             from {
                 width: 0;
             }

             to {
                 width: var(--tw-width);
             }
         }

         @keyframes nameTypeCaret {
             0%, 100% {
                 border-color: rgba(var(--accent-rgb, 120,40,200), 0.8);
             }

             50% {
                 border-color: transparent;
             }
         }

         .name-glitch {
             position: relative;
             animation: nameGlitchMain 3s infinite;
         }

             .name-glitch::before, .name-glitch::after {
                 content: attr(data-text);
                 position: absolute;
                 top: 0;
                 left: 0;
                 width: 100%;
                 height: 100%;
             }

             .name-glitch::before {
                 color: #ff00ff;
                 clip-path: inset(0 0 60% 0);
                 animation: nameGlitch1 2s infinite linear alternate-reverse;
             }

             .name-glitch::after {
                 color: #00ffff;
                 clip-path: inset(60% 0 0 0);
                 animation: nameGlitch2 2s infinite linear alternate-reverse;
             }

         @keyframes nameGlitchMain {
             0%,95% {
                 opacity: 1
             }

             96% {
                 opacity: 0.8
             }

             97% {
                 opacity: 1
             }
         }

         @keyframes nameGlitch1 {
             0% {
                 transform: translate(0)
             }

             20% {
                 transform: translate(-2px,1px)
             }

             40% {
                 transform: translate(2px,-1px)
             }

             60% {
                 transform: translate(-1px,2px)
             }

             80% {
                 transform: translate(1px,-1px)
             }

             100% {
                 transform: translate(0)
             }
         }

         @keyframes nameGlitch2 {
             0% {
                 transform: translate(0)
             }

             20% {
                 transform: translate(2px,1px)
             }

             40% {
                 transform: translate(-1px,-2px)
             }

             60% {
                 transform: translate(1px,1px)
             }

             80% {
                 transform: translate(-2px,-1px)
             }

             100% {
                 transform: translate(0)
             }
         }

         .wave-letter {
             display: inline-block;
             animation: nameWave 1.5s ease-in-out infinite;
         }

         @keyframes nameWave {
             0%,100% {
                 transform: translateY(0)
             }

             50% {
                 transform: translateY(-6px)
             }
         }

         .name-shimmer {
             background: linear-gradient(120deg, #f5f5f7 30%, rgba(var(--accent-rgb, 120,40,200), 0.8) 50%, #f5f5f7 70%);
             background-size: 200% 100%;
             -webkit-background-clip: text;
             background-clip: text;
             -webkit-text-fill-color: transparent;
             animation: nameShimmerSweep 2.5s ease-in-out infinite;
         }

         @keyframes nameShimmerSweep {
             0% {
                 background-position: 200% 50%
             }

             100% {
                 background-position: -200% 50%
             }
         }

         /* ── Classified name effect ── */
         .name-classified {
             font-family: 'Courier New', 'Courier', monospace;
             letter-spacing: 0.1em;
         }

         .cls-letter {
             display: inline-block;
             color: rgba(var(--accent-rgb, 120,40,200), 0.45);
             transition: color 0.1s ease;
         }

             .cls-letter.cls-revealed {
                 color: inherit;
             }

         /* ── Text stroke ── */
         .text-stroke {
             -webkit-text-stroke: var(--text-stroke-width, 1px) var(--text-stroke-color, rgba(255,255,255,0.3));
             paint-order: stroke fill;
         }

         /* ── Text shadow (readability on light backgrounds) ── */
         .profile.text-shadow-on,
         .profile.text-shadow-on .display-name,
         .profile.text-shadow-on .bio,
         .profile.text-shadow-on .username,
         .profile.text-shadow-on .view-count,
         .profile.text-shadow-on .profile-location,
         .profile.text-shadow-on .profile-timezone,
         .profile.text-shadow-on .link-btn,
         .profile.text-shadow-on .social-icon,
         .profile.text-shadow-on .discord-activity,
         .profile.text-shadow-on .spotify-np,
         .profile.text-shadow-on .profile-badges {
             text-shadow: var(--text-shadow, 0 1px 4px rgba(0,0,0,0.7), 0 0 12px rgba(0,0,0,0.4));
         }

         .profile-widgets-wrap.text-shadow-on,
         .profile-widgets-wrap.text-shadow-on .profile-widget-name,
         .profile-widgets-wrap.text-shadow-on .profile-widget-status,
         .profile-widgets-wrap.text-shadow-on .widget-activity-name,
         .profile-widgets-wrap.text-shadow-on .widget-activity-detail,
         .profile-widgets-wrap.text-shadow-on .widget-server-name,
         .profile-widgets-wrap.text-shadow-on .widget-server-counts,
         .profile-widgets-wrap.text-shadow-on .widget-gh-user {
             text-shadow: var(--text-shadow, 0 1px 4px rgba(0,0,0,0.7), 0 0 12px rgba(0,0,0,0.4));
         }

         /* ── Avatar shapes ── */
         .avatar-rounded {
             border-radius: 20% !important;
         }

         .avatar-hexagon {
             border-radius: 0 !important;
             clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
             border: none !important;
         }

         .avatar-squircle {
             border-radius: 30% !important;
         }

         /* ── Avatar custom border ── */
         .avatar-custom-border {
             border-width: var(--avatar-border-width, 2px) !important;
             border-style: solid !important;
             border-color: var(--avatar-border-color, rgba(255,255,255,0.08)) !important;
         }

         .avatar-animated-border {
             border: none !important;
             position: relative;
         }

         .avatar-wrapper.animated-border {
             border-radius: 50%;
             overflow: visible;
             padding: var(--avatar-border-width, 3px);
         }

             .avatar-wrapper.animated-border:has(.avatar-rounded) {
                 border-radius: 20%;
             }

             .avatar-wrapper.animated-border:has(.avatar-squircle) {
                 border-radius: 30%;
             }

             .avatar-wrapper.animated-border:has(.avatar-hexagon) {
                 border-radius: 0;
             }

             .avatar-wrapper.animated-border::before {
                 content: '';
                 position: absolute;
                 inset: -1px;
                 z-index: 0;
                 border-radius: inherit;
                 background: conic-gradient(from var(--border-angle, 0deg), var(--avatar-border-color, var(--accent-color, #8b5cf6)), transparent 40%, var(--avatar-border-color, var(--accent-color, #8b5cf6)));
                 animation: avatarBorderSpin 3s linear infinite;
             }

         @keyframes avatarBorderSpin {
             to {
                 --border-angle: 360deg;
             }
         }

         @property --border-angle {
             syntax: '<angle>';
             initial-value: 0deg;
             inherits: false;
         }

         /* Promote scale/translate animations to wrapper when animated-border is used */
         .avatar-wrapper.animated-border:has(.avatar-pulse) {
             animation: avatarPulse 3s ease-in-out infinite;
         }

         .avatar-wrapper.animated-border > .avatar-pulse {
             animation: none;
         }

         .avatar-wrapper.animated-border:has(.avatar-pulse):hover {
             animation-play-state: paused;
         }

         .avatar-wrapper.animated-border:has(.avatar-bounce) {
             animation: avatarBounce 2s ease-in-out infinite;
         }

         .avatar-wrapper.animated-border > .avatar-bounce {
             animation: none;
         }

         .avatar-wrapper.animated-border:has(.avatar-bounce):hover {
             animation-play-state: paused;
         }

         .link-flat {

             border: none !important;

             background: transparent !important;
             border: none !important;
             border-radius: 0 !important;

             box-shadow: none !important;
             padding: 0.9rem 0.5rem !important;

             .link-minimal::after {

             .link-minimal::before {

                 position: absolute !important;
                 bottom: -1px;
                 left: 0;
                 width: 0;
                 height: 1px;
                 background: rgba(var(--btn-rgb, 139,92,246), 0.8) !important;

                 width: 100% !important;

             .link-minimal:hover {
                 transform: none !important;
                 box-shadow: none !important;

             z-index: 1;

             .link-slide::before {

                 position: absolute !important;
                 top: 0;
                 left: -100%;
                 width: 100%;
                 height: 100%;
                 background: rgba(var(--btn-rgb, 139,92,246), 0.2) !important;
                 transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1) !important;
                 z-index: -1 !important;

         .link-bracketed {

             .link-bracketed:hover {

                 filter: brightness(1.3);
                 transform: none !important;
                 box-shadow: none !important;
             }
         /* ── Music player widget ── */
         .music-player {
             position: fixed;
             bottom: 24px;
             right: 24px;
             background: rgba(12, 12, 14, 0.75);
             border: 1px solid rgba(255,255,255,0.07);
             border-radius: 22px;
             backdrop-filter: blur(24px) saturate(160%);
             -webkit-backdrop-filter: blur(24px) saturate(160%);
             z-index: 100;
             display: flex;
             flex-direction: column;
             overflow: hidden;
             cursor: default;
             transition: width 0.45s cubic-bezier(0.16,1,0.3,1), height 0.45s cubic-bezier(0.16,1,0.3,1), border-color 0.4s ease, box-shadow 0.4s ease, border-radius 0.45s cubic-bezier(0.16,1,0.3,1), opacity 0.5s cubic-bezier(0.16,1,0.3,1), transform 0.5s cubic-bezier(0.16,1,0.3,1);
             width: 44px;
             height: 44px;
             opacity: 0;
             transform: translateY(12px);
             pointer-events: none;
         }

             .music-player.visible {
                 opacity: 1;
                 transform: translateY(0);
                 pointer-events: auto;
             }

             .music-player.expanded {
                 width: 280px;
                 height: 88px;
                 border-radius: 16px;
             }

             .music-player.playing {
                 border-color: rgba(var(--accent-rgb, 120,40,200), 0.2);
                 box-shadow: 0 4px 32px -8px rgba(0,0,0,0.6), 0 0 0 1px rgba(var(--accent-rgb, 120,40,200), 0.06);
             }

         /* Inner wrapper for padding (avoids layout jump) */
         .mp-inner {
             padding: 0;
             display: flex;
             flex-direction: column;
             gap: 8px;
             width: 280px;
             min-height: 88px;
         }

         /* Top row: play btn + info + volume */
         .mp-top {
             display: flex;
             align-items: center;
             gap: 10px;
             padding: 0;
             transition: padding 0.45s cubic-bezier(0.16,1,0.3,1);
         }

         .music-player.expanded .mp-top {
             padding: 10px 14px 0;
         }

         .mp-play-btn {
             width: 44px;
             height: 44px;
             flex-shrink: 0;
             display: flex;
             align-items: center;
             justify-content: center;
             border-radius: 50%;
             background: transparent;
             border: none;
             cursor: pointer;
             transition: width 0.45s cubic-bezier(0.16,1,0.3,1), height 0.45s cubic-bezier(0.16,1,0.3,1), background 0.2s, transform 0.15s;
             color: rgba(255,255,255,0.5);
             font-size: 0.7rem;
         }

         .music-player.expanded .mp-play-btn {
             width: 34px;
             height: 34px;
             background: rgba(255,255,255,0.06);
             border: 1px solid rgba(255,255,255,0.08);
         }

         .mp-play-btn:hover {
             background: rgba(255,255,255,0.1);
             transform: scale(1.05);
         }

         .mp-play-btn:active {
             transform: scale(0.95);
         }

         .music-player.playing .mp-play-btn {
             color: var(--accent-color, #8b5cf6);
         }

         .music-player.expanded.playing .mp-play-btn {
             background: rgba(var(--accent-rgb, 120,40,200), 0.12);
             border-color: rgba(var(--accent-rgb, 120,40,200), 0.2);
         }

         .mp-play-btn .fa-play {
             margin-left: 2px;
         }

         /* Bars visualiser */
         .mp-bars {
             display: flex;
             align-items: flex-end;
             gap: 2.5px;
             height: 16px;
         }

             .mp-bars .bar {
                 width: 2.5px;
                 border-radius: 2px;
                 background: var(--accent-color, #8b5cf6);
                 height: 4px;
             }

         .music-player.playing .mp-bars .bar:nth-child(1) {
             animation: mp-eq1 0.45s ease-in-out infinite alternate;
         }

         .music-player.playing .mp-bars .bar:nth-child(2) {
             animation: mp-eq2 0.55s ease-in-out infinite alternate;
         }

         .music-player.playing .mp-bars .bar:nth-child(3) {
             animation: mp-eq3 0.5s ease-in-out infinite alternate;
         }

         @keyframes mp-eq1 {
             0% {
                 height: 3px;
             }

             100% {
                 height: 12px;
             }
         }

         @keyframes mp-eq2 {
             0% {
                 height: 5px;
             }

             100% {
                 height: 16px;
             }
         }

         @keyframes mp-eq3 {
             0% {
                 height: 4px;
             }

             100% {
                 height: 10px;
             }
         }

         /* Track info — hidden when collapsed */
         .mp-info {
             flex: 1;
             min-width: 0;
             display: flex;
             flex-direction: column;
             gap: 2px;
             opacity: 0;
             transform: translateX(-6px);
             transition: opacity 0.3s cubic-bezier(0.16,1,0.3,1) 0.05s, transform 0.3s cubic-bezier(0.16,1,0.3,1) 0.05s;
         }

         .music-player.expanded .mp-info {
             opacity: 1;
             transform: translateX(0);
         }

         .mp-title {
             font-size: 0.78rem;
             font-weight: 600;
             color: #e5e5e7;
             white-space: nowrap;
             overflow: hidden;
             text-overflow: ellipsis;
             letter-spacing: 0.005em;
             line-height: 1.3;
         }

         .mp-artist {
             font-size: 0.65rem;
             font-weight: 400;
             color: rgba(255,255,255,0.35);
             white-space: nowrap;
             overflow: hidden;
             text-overflow: ellipsis;
             line-height: 1.3;
         }

         /* Volume — hidden when collapsed */
         .mp-vol {
             flex-shrink: 0;
             display: flex;
             align-items: center;
             gap: 6px;
             opacity: 0;
             transform: translateX(-4px);
             transition: opacity 0.3s cubic-bezier(0.16,1,0.3,1) 0.1s, transform 0.3s cubic-bezier(0.16,1,0.3,1) 0.1s;
         }

         .music-player.expanded .mp-vol {
             opacity: 1;
             transform: translateX(0);
         }

         .mp-vol-icon {
             font-size: 0.65rem;
             color: rgba(255,255,255,0.3);
             cursor: pointer;
             transition: color 0.2s;
             width: 14px;
             text-align: center;
         }

             .mp-vol-icon:hover {
                 color: rgba(255,255,255,0.7);
             }

         .mp-vol input[type=range] {
             -webkit-appearance: none;
             appearance: none;
             width: 50px;
             height: 3px;
             border-radius: 2px;
             background: rgba(255,255,255,0.08);
             outline: none;
             cursor: pointer;
         }

             .mp-vol input[type=range]::-webkit-slider-thumb {
                 -webkit-appearance: none;
                 appearance: none;
                 width: 10px;
                 height: 10px;
                 border-radius: 50%;
                 background: rgba(255,255,255,0.5);
                 transition: background 0.15s, transform 0.15s;
             }

                 .mp-vol input[type=range]::-webkit-slider-thumb:hover {
                     background: rgba(255,255,255,0.8);
                     transform: scale(1.2);
                 }

             .mp-vol input[type=range]::-moz-range-thumb {
                 width: 10px;
                 height: 10px;
                 border-radius: 50%;
                 border: none;
                 background: rgba(255,255,255,0.5);
             }

         /* Seek bar row — hidden when collapsed */
         .mp-seek-row {
             display: flex;
             align-items: center;
             gap: 8px;
             padding: 0 14px 10px;
             opacity: 0;
             transition: opacity 0.3s cubic-bezier(0.16,1,0.3,1) 0.12s;
         }

         .music-player.expanded .mp-seek-row {
             opacity: 1;
         }

         .mp-time {
             font-size: 0.58rem;
             font-weight: 500;
             color: rgba(255,255,255,0.25);
             min-width: 28px;
             text-align: center;
             font-variant-numeric: tabular-nums;
             letter-spacing: 0.02em;
         }

         .mp-seek {
             flex: 1;
             position: relative;
             height: 16px;
             display: flex;
             align-items: center;
             cursor: pointer;
         }

         .mp-seek-track {
             width: 100%;
             height: 3px;
             border-radius: 2px;
             background: rgba(255,255,255,0.06);
             overflow: hidden;
         }

         .mp-seek-fill {
             height: 100%;
             width: 0%;
             border-radius: 2px;
             background: var(--accent-color, #8b5cf6);
             transition: width 0.15s linear;
         }

         .mp-seek-thumb {
             position: absolute;
             width: 8px;
             height: 8px;
             border-radius: 50%;
             background: var(--accent-color, #8b5cf6);
             box-shadow: 0 0 6px rgba(var(--accent-rgb, 120,40,200), 0.4);
             top: 50%;
             transform: translate(-50%, -50%);
             left: 0%;
             opacity: 0;
             transition: opacity 0.2s;
             pointer-events: none;
         }

         .mp-seek:hover .mp-seek-thumb {
             opacity: 1;
         }

         /* Skip controls (playlist mode) */
         .mp-skip-row {
             display: flex;
             align-items: center;
             justify-content: center;
             gap: 12px;
             padding: 0 14px 6px;
             opacity: 0;
             transition: opacity 0.3s cubic-bezier(0.16,1,0.3,1) 0.12s;
         }

         .music-player.expanded .mp-skip-row {
             opacity: 1;
         }

         .mp-skip-btn {
             background: none;
             border: none;
             cursor: pointer;
             color: rgba(255,255,255,0.3);
             font-size: 0.7rem;
             padding: 4px 6px;
             border-radius: 6px;
             transition: color 0.2s, background 0.2s;
             display: flex;
             align-items: center;
             gap: 5px;
         }

             .mp-skip-btn:hover {
                 color: rgba(255,255,255,0.75);
                 background: rgba(255,255,255,0.06);
             }

         .mp-track-indicator {
             font-size: 0.6rem;
             color: rgba(255,255,255,0.2);
             font-variant-numeric: tabular-nums;
             letter-spacing: 0.04em;
             flex: 1;
             text-align: center;
         }

         /* ── Player visualiser canvas (always on in expanded player) ── */
         .mp-vis-canvas {
             width: 100%;
             display: block;
             height: 0;
             opacity: 0;
             transition: height 0.45s cubic-bezier(0.16,1,0.3,1), opacity 0.35s ease;
             border-radius: 0 0 16px 16px;
         }

             .mp-vis-canvas.active {
                 height: 30px;
                 opacity: 1;
             }

         .music-player.expanded.vis-active {
             height: 118px;
         }

         /* ── Profile card visualiser (behind view count) ── */
         .profile-vis-canvas {
             position: absolute;
             bottom: 0;
             left: 0;
             width: 100%;
             height: 25%;
             pointer-events: none;
             opacity: 0;
             transition: opacity 0.5s ease;
             z-index: 0;
             border-radius: 0 0 var(--card-radius, 24px) var(--card-radius, 24px);
             overflow: hidden;
         }

             .profile-vis-canvas.active {
                 opacity: var(--vis-opacity, 1);
             }

         /* ── Full-page visualiser (separate from card) ── */
         #fullpageVisCanvas {
             position: fixed;
             bottom: 0;
             left: 0;
             width: 100vw;
             height: 80vh;
             pointer-events: none;
             opacity: 0;
             transition: opacity 0.5s ease;
             z-index: 1;
         }

             #fullpageVisCanvas.active {
                 opacity: var(--vis-opacity, 1);
             }

         /* ── Profile banner ── */
         .profile-banner {
             position: relative;
             width: calc(100% + 5rem);
             margin: -3rem -2.5rem 0;
             height: 160px;
             overflow: hidden;
             border-radius: var(--card-radius, 24px) var(--card-radius, 24px) 0 0;
             contain: layout style;
         }

         .profile:not(.card-bg) .profile-banner {
             width: 100%;
             margin: 0 0 0;
             border-radius: 16px 16px 0 0;
         }

         .profile-banner img {
             width: 100%;
             height: 100%;
             object-fit: cover;
             display: block;
             border-radius: inherit;
         }

         .profile-banner .banner-fade {
             position: absolute;
             bottom: 0;
             left: 0;
             right: 0;
             height: 70%;
             background: linear-gradient(to top, var(--bg-color, #0a0a0a), transparent);
             pointer-events: none;
         }

         .profile.card-bg .profile-banner .banner-fade {
             background: linear-gradient(to top, var(--card-bg, rgba(10,10,10,0.95)) 0%, transparent 100%);
         }

         .has-banner .avatar-wrapper {
             margin-top: -50px;
             position: relative;
             z-index: 2;
         }

         /* ── Wide card layout ── */
         .profile.layout-wide {
             max-width: 600px;
             width: 600px;
             text-align: left;
             padding: 0;
         }

             .profile.layout-wide.card-bg {

             }

             .profile.layout-wide .wide-header {

             }

             .profile.layout-wide .avatar-wrapper {

             }

             .profile.layout-wide .wide-header-info {

             .profile.layout-wide .display-name {

             .profile.layout-wide .username {

             }

             .profile.layout-wide .profile-tags {

             .profile.layout-wide .wide-header-info .social-icon {

             /* Banner adjustments for wide layout */

             letter-spacing: 0.01em;

             backdrop-filter: blur(20px);
             -webkit-backdrop-filter: blur(20px);

             will-change: transform;
             backface-visibility: hidden;
             -webkit-backface-visibility: hidden;
             contain: layout paint style;
         }
             /* Resting border */
             .link-btn::after {
                 content: '';
                 position: absolute;
                 inset: -1px;
                 border-radius: inherit;
                 border: 1px solid rgba(255,255,255,0.06);
                 transition: opacity 0.35s ease;
                 pointer-events: none;
             }

                 border-color: transparent;
                 background: radial-gradient(circle 200px at var(--gx) var(--gy), rgba(var(--btn-rgb, 139,92,246), 0.55) 0%, rgba(255,255,255,0.06) 100%);
                 -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
                 mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
                 -webkit-mask-composite: xor;
                 mask-composite: exclude;
                 padding: 1px;
             }
             /* Inner glow fill */
             .link-btn::before {
                 content: '';
                 position: absolute;
                 inset: 0;
                 background: radial-gradient(circle 180px at var(--gx) var(--gy), rgba(var(--btn-rgb, 139,92,246), 0.25) 0%, transparent 100%);
                 opacity: 0;
                 transition: opacity 0.35s ease;

                 opacity: 1;
