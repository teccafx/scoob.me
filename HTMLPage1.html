                 transform: rotate(0deg);
             }

             to {
                 transform: rotate(360deg);
             }
         }

         /* ── New avatar effects ── */
         .avatar-orbit {
             position: relative;
         }

         .avatar-wrapper.orbit-ring::after {
             content: '';
             position: absolute;
             inset: -10px;
             z-index: 0;
             border: 2px solid transparent;
             border-top-color: rgba(var(--accent-rgb, 120,40,200), 0.6);
             border-right-color: rgba(var(--accent-rgb, 120,40,200), 0.3);
             border-radius: 50%;
             animation: avatarOrbit 3s linear infinite;
         }

         @keyframes avatarOrbit {
             to {
                 transform: rotate(360deg);
             }
         }

         .avatar-bounce {
             animation: avatarBounce 2s ease-in-out infinite;
         }

         @keyframes avatarBounce {
             0%, 100% {
                 transform: translateY(0);
             }

             30% {
                 transform: translateY(-12px);
             }

             50% {
                 transform: translateY(0);
             }

             70% {
                 transform: translateY(-6px);
             }
         }

         .avatar-bounce:hover {
             animation-play-state: paused;
             transform: scale(1.05);
         }

         .avatar-glitch {
             animation: avatarGlitchAnim 4s infinite;
         }

         @keyframes avatarGlitchAnim {
             0%, 90%, 100% {
                 transform: translate(0);
                 filter: none;
             }

             91% {
                 transform: translate(-3px, 1px);
                 filter: hue-rotate(90deg);
             }

             92% {
                 transform: translate(3px, -1px);
                 filter: hue-rotate(-90deg);
             }

             93% {
                 transform: translate(-1px, -2px);
                 filter: saturate(2);
             }

             94% {
                 transform: translate(2px, 1px);
                 filter: hue-rotate(180deg);
             }

             95% {
                 transform: translate(0);
                 filter: none;
             }
         }

         .avatar-morph {
             transition: border-radius 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.3s ease;
         }

             .avatar-morph:hover {
                 border-radius: 30% 70% 70% 30% / 30% 30% 70% 70% !important;
                 transform: scale(1.05) rotate(5deg);
             }

         .avatar-rainbow {
             border: 3px solid transparent !important;
             background-clip: padding-box !important;
         }

         .avatar-wrapper.rainbow-ring::before {
             content: '';
             position: absolute;
             inset: -4px;
             z-index: 0;
             border-radius: inherit;
             background: conic-gradient(from var(--rainbow-angle, 0deg), #ff0000, #ff8800, #ffff00, #00ff00, #0088ff, #8800ff, #ff0088, #ff0000);
             animation: avatarRainbow 3s linear infinite;
         }

         @keyframes avatarRainbow {
             to {

             }
         }

         @property --rainbow-angle {
             syntax: '<angle>';
             initial-value: 0deg;
             inherits: false;
         }

         /* Splash / gateway overlay */
         .splash {
             position: fixed;
             top: 0;
             left: 0;
             width: 100%;
             height: 100%;
             z-index: 10000;
             display: flex;
             align-items: center;
             justify-content: center;
             flex-direction: column;
             cursor: pointer;
             background: rgba(0,0,0,0.7);
             backdrop-filter: blur(24px) saturate(180%);
             -webkit-backdrop-filter: blur(24px) saturate(180%);
             transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.6s;
         }

             .splash.hidden {
                 opacity: 0;
                 visibility: hidden;
                 pointer-events: none;
             }

         .splash-inner {
             display: flex;
             flex-direction: column;
             align-items: center;
             transition: opacity 0.25s ease;
         }

         .splash-text {
             font-size: 0.95rem;
             font-weight: 400;
             color: rgba(255,255,255,0.5);
             letter-spacing: 0.06em;
             text-transform: uppercase;
             animation: splashPulse 2.5s ease-in-out infinite;
         }

         .splash-icon {
             font-size: 2rem;
             color: rgba(255,255,255,0.1);
             margin-bottom: 1.2rem;
         }

         @keyframes splashPulse {
             0%, 100% {
                 opacity: 0.5;
             }

             50% {
                 opacity: 1;
             }
         }
         /* Splash effect variants */
         .splash-text.splash-fx-glow {
             animation: splashGlow 2.5s ease-in-out infinite;
             color: rgba(255,255,255,0.8);
         }

         @keyframes splashGlow {
             0%, 100% {
                 opacity: 0.6;
                 text-shadow: 0 0 8px rgba(var(--accent-rgb),0.4), 0 0 20px rgba(var(--accent-rgb),0.2);
             }

             50% {
                 opacity: 1;
                 text-shadow: 0 0 16px rgba(var(--accent-rgb),0.9), 0 0 40px rgba(var(--accent-rgb),0.5), 0 0 70px rgba(var(--accent-rgb),0.2);
             }
         }

         .splash-text.splash-fx-neon {
             animation: splashNeon 1.8s ease-in-out infinite;
             color: rgba(255,255,255,0.95);
         }

         @keyframes splashNeon {
             0%, 100% {
                 opacity: 1;
                 text-shadow: 0 0 4px #fff, 0 0 10px rgba(var(--accent-rgb),1), 0 0 20px rgba(var(--accent-rgb),0.8), 0 0 40px rgba(var(--accent-rgb),0.5);
             }

             50% {
                 opacity: 0.85;
                 text-shadow: 0 0 2px #fff, 0 0 6px rgba(var(--accent-rgb),0.9), 0 0 14px rgba(var(--accent-rgb),0.6);
             }
         }

         .splash-text.splash-fx-glitch {
             animation: splashGlitch 3s steps(1) infinite;
             color: rgba(255,255,255,0.9);
         }

         @keyframes splashGlitch {
             0%, 90%, 100% {
                 opacity: 0.8;
                 clip-path: none;
                 transform: none;
                 text-shadow: none;
             }

             92% {
                 opacity: 1;
                 clip-path: inset(20% 0 60% 0);
                 transform: translateX(-4px);
                 text-shadow: 3px 0 rgba(var(--accent-rgb),0.8);
             }

             94% {
                 opacity: 1;
                 clip-path: inset(60% 0 10% 0);
                 transform: translateX(4px);
                 text-shadow: -3px 0 rgba(0,255,255,0.6);
             }

             96% {
                 opacity: 0.5;
                 clip-path: none;
                 transform: none;
             }

             98% {
                 opacity: 1;
                 clip-path: inset(40% 0 40% 0);
                 transform: translateX(-2px);
             }
         }

         .splash-text.splash-fx-blink {
             animation: splashBlink 1.1s step-start infinite;
         }

         @keyframes splashBlink {
             0%, 100% {
                 opacity: 0.7;
             }

             50% {
                 opacity: 0;
             }
         }

         .splash-icon.splash-fx-glow {
             color: rgba(var(--accent-rgb), 0.5);
         }

         .splash-icon.splash-fx-neon {
             color: rgba(var(--accent-rgb), 0.8);
         }

        g3.addColorStop(1, `rgba(${gradColors[2]},0)`);
        ctx.fillStyle = g3;
        ctx.fillRect(0, 0, w, h);
        }
        });
        } else if (style === 'aurora') {
        let time = 0;
        const speed = 0.005 * speedMul;
        const bandCount = 4;
        const auroraColors = customColors || [rgb, `${parseInt(rgb)*0.5},200,255`, `100,255,${parseInt(rgb.split(',')[2])||200}`];
        if (auroraColors.length < 2) { auroraColors.push('100,200,255'); auroraColors.push('50,255,150'); }
        particleLoop(() => {
        time += speed;
        ctx.clearRect(0, 0, w, h);
        for (let b = 0; b < bandCount; b++) {
        const color = auroraColors[b % auroraColors.length];
        ctx.beginPath();
        ctx.moveTo(0, h * 0.3);
        for (let x = 0; x <= w; x += 4) {
        const y = h * (0.2 + b * 0.08) +
        Math.sin(x * 0.003 + time * (1.5 + b * 0.3)) * (40 + b * 15) * sizeMul +
        Math.sin(x * 0.007 + time * (0.8 + b * 0.2) + b) * (20 + b * 10) * sizeMul;
        ctx.lineTo(x, y);
        }
        ctx.lineTo(w, h);
        ctx.lineTo(0, h);
        ctx.closePath();
        const grad = ctx.createLinearGradient(0, h * 0.2, 0, h * 0.6);
        grad.addColorStop(0, `rgba(${color},${0.03 + b * 0.01})`);
        grad.addColorStop(0.5, `rgba(${color},${0.06 + b * 0.015})`);
        grad.addColorStop(1, `rgba(${color},0)`);
        ctx.fillStyle = grad;
        ctx.fill();
        }
        });
        } else if (style === 'bubbles') {
        const count = opts.count || 30;
        for (let i = 0; i < count; i++) ps.push({
        x: Math.random()*w, y: Math.random()*h,
        r: (Math.random()*25+10)*sizeMul,
        s: (Math.random()*0.4+0.2)*speedMul,
        wx: Math.random()*Math.PI*2,
        ws: (Math.random()*0.01+0.005)*speedMul,
        o: Math.random()*0.15+0.05,
        c: pickRgb()
        });
        particleLoop(() => {
        ctx.clearRect(0,0,w,h);
        ps.forEach(p => {
        p.y -= p.s; p.wx += p.ws; p.x += Math.sin(p.wx) * 0.5;
        if (p.y < -p.r*2) { p.y = h + p.r*2; p.x = Math.random()*w; }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.strokeStyle = `rgba(${p.c},${p.o + 0.1})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Inner fill
        const gr = ctx.createRadialGradient(p.x - p.r*0.3, p.y - p.r*0.3, p.r*0.1, p.x, p.y, p.r);
        gr.addColorStop(0, `rgba(255,255,255,${p.o*0.5})`);
        gr.addColorStop(0.5, `rgba(${p.c},${p.o*0.3})`);
        gr.addColorStop(1, `rgba(${p.c},0)`);
        ctx.fillStyle = gr;
        ctx.fill();
        });
        });
        } else if (style === 'rain') {
        const count = opts.count || 200;
        const angle = 0.1;
        for (let i = 0; i < count; i++) ps.push({
        x: Math.random()*w*1.2, y: Math.random()*h,
        len: (Math.random()*15+8)*sizeMul,
        s: (Math.random()*6+4)*speedMul,
        o: Math.random()*0.2+0.1
        });
        const splashes = [];
        particleLoop(() => {
        ctx.clearRect(0,0,w,h);
        // Raindrops
        ps.forEach(p => {
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x - angle * p.len, p.y + p.len);
        ctx.strokeStyle = `rgba(200,210,220,${p.o})`;
        ctx.lineWidth = 1;
        ctx.stroke();
        p.y += p.s; p.x -= angle * p.s;
        if (p.y > h) {
        // Splash
        splashes.push({ x: p.x, y: h - 2, r: 0, maxR: Math.random()*4+2, o: 0.4 });
        p.y = -p.len; p.x = Math.random()*w*1.2;
        }
        });
        // Splashes
        for (let i = splashes.length-1; i >= 0; i--) {
        const s = splashes[i];
        s.r += 0.5 * speedMul;
        s.o -= 0.02;
        if (s.o <= 0) { splashes.splice(i,1); continue; }
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, Math.PI, 0);
        ctx.strokeStyle = `rgba(200,210,220,${s.o})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
        }
        });
        } else if (style === 'confetti') {
        const count = opts.count || 60;
        const defaultConfettiColors = ['255,100,100','100,255,100','100,100,255','255,255,100','255,100,255','100,255,255'];
        const colors = customColors || defaultConfettiColors;
        for (let i = 0; i < count; i++) ps.push({
        x: Math.random()*w, y: Math.random()*h,
        w: (Math.random()*6+4)*sizeMul,
        h: (Math.random()*4+2)*sizeMul,
        s: (Math.random()*1.5+0.5)*speedMul,
        wx: Math.random()*Math.PI*2,
        ws: (Math.random()*0.03+0.01)*speedMul,
        rot: Math.random()*360,
        rotS: (Math.random()-0.5)*4*speedMul,
        drift: (Math.random()-0.5)*0.8*speedMul,
        c: colors[Math.floor(Math.random()*colors.length)],
        o: Math.random()*0.5+0.4
        });
        particleLoop(() => {
        ctx.clearRect(0,0,w,h);
        ps.forEach(p => {
        p.y += p.s; p.x += p.drift + Math.sin(p.wx)*0.5;
        p.wx += p.ws; p.rot += p.rotS;
        if (p.y > h + 10) { p.y = -10; p.x = Math.random()*w; }
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI/180);
        ctx.fillStyle = `rgba(${p.c},${p.o})`;
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
        });
        });
        } else if (style === 'rave') {
        const beamCount = opts.count || 14;
        const defaultRaveColors = ['255,0,100','0,120,255','0,255,80','255,0,255','255,40,40','0,255,220','120,0,255','255,200,0'];
        const colors = customColors || defaultRaveColors;
        const beams = [];
        for (let i = 0; i < beamCount; i++) {
        beams.push(makeBeam(i));
        }
        function makeBeam(idx) {
        const edge = Math.floor(Math.random() * 4);
        let ox, oy;
        if (edge === 0) { ox = Math.random() * w; oy = 0; }
        else if (edge === 1) { ox = w; oy = Math.random() * h; }
        else if (edge === 2) { ox = Math.random() * w; oy = h; }
        else { ox = 0; oy = Math.random() * h; }
        const cx = w * (0.3 + Math.random() * 0.4);
        const cy = h * (0.3 + Math.random() * 0.4);
        const baseAngle = Math.atan2(cy - oy, cx - ox);
        return {
        ox, oy,
        angle: baseAngle + (Math.random() - 0.5) * 0.8,
        targetAngle: baseAngle + (Math.random() - 0.5) * 1.2,
        sweepSpeed: (Math.random() * 0.008 + 0.003) * speedMul,
        width: (Math.random() * 12 + 6) * sizeMul,
        len: Math.max(w, h) * (0.8 + Math.random() * 0.6),
        c: colors[idx % colors.length],
        o: Math.random() * 0.25 + 0.15,
        flickerPhase: Math.random() * Math.PI * 2,
        flickerSpeed: (Math.random() * 0.06 + 0.02) * speedMul,
        life: Math.round((Math.random() * 300 + 150) / speedMul),
        maxLife: Math.round((Math.random() * 300 + 150) / speedMul)
        };
        }
        let tick = 0;
        particleLoop(() => {
        ctx.clearRect(0, 0, w, h);
        ctx.globalCompositeOperation = 'lighter';
        tick++;
        beams.forEach((b, i) => {
        const diff = b.targetAngle - b.angle;
        b.angle += diff * b.sweepSpeed;
        if (Math.abs(diff) < 0.05) {
        b.targetAngle = b.angle + (Math.random() - 0.5) * 1.5;
        }
        b.flickerPhase += b.flickerSpeed;
        const flicker = 0.6 + Math.sin(b.flickerPhase) * 0.4;
        const alpha = b.o * flicker;

        // Draw beam as tapered cone
        const endX = b.ox + Math.cos(b.angle) * b.len;
        const endY = b.oy + Math.sin(b.angle) * b.len;
        const perpX = Math.cos(b.angle + Math.PI / 2);
        const perpY = Math.sin(b.angle + Math.PI / 2);
        const halfW = b.width * 0.5;
        const endHalfW = b.width * 3;

        ctx.beginPath();
        ctx.moveTo(b.ox + perpX * halfW, b.oy + perpY * halfW);
        ctx.lineTo(endX + perpX * endHalfW, endY + perpY * endHalfW);
        ctx.lineTo(endX - perpX * endHalfW, endY - perpY * endHalfW);
        ctx.lineTo(b.ox - perpX * halfW, b.oy - perpY * halfW);
        ctx.closePath();

        const grad = ctx.createLinearGradient(b.ox, b.oy, endX, endY);
        grad.addColorStop(0, `rgba(${b.c},${alpha * 0.9})`);
        grad.addColorStop(0.3, `rgba(${b.c},${alpha * 0.5})`);
        grad.addColorStop(1, `rgba(${b.c},0)`);
        ctx.fillStyle = grad;
        ctx.fill();

        // Bright core line
        ctx.beginPath();
        ctx.moveTo(b.ox, b.oy);
        ctx.lineTo(b.ox + Math.cos(b.angle) * b.len * 0.7, b.oy + Math.sin(b.angle) * b.len * 0.7);
        ctx.strokeStyle = `rgba(${b.c},${alpha * 0.6})`;
        ctx.lineWidth = 1.5 * sizeMul;
        ctx.stroke();

        // Origin glow
        const glow = ctx.createRadialGradient(b.ox, b.oy, 0, b.ox, b.oy, 20 * sizeMul);
        glow.addColorStop(0, `rgba(${b.c},${alpha * 0.8})`);
        glow.addColorStop(1, `rgba(${b.c},0)`);
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(b.ox, b.oy, 20 * sizeMul, 0, Math.PI * 2);
        ctx.fill();

        // Lifecycle: respawn beam periodically
        b.life--;
        if (b.life <= 0) {
        const nb = makeBeam(i);
        Object.assign(b, nb);
        }
        });
        ctx.globalCompositeOperation = 'source-over';
        });
        }
        }

        /* ── Cursor trail ── */
        function initCursorTrail(type, color, trailDuration) {
        // Cleanup previous cursor trail
        if (_cursorRafId != null) { cancelAnimationFrame(_cursorRafId); _cursorRafId = null; }
        if (_cursorAbort) { _cursorAbort.abort(); }
        if (_cometResizeAbort) { _cometResizeAbort.abort(); _cometResizeAbort = null; }
        document.querySelectorAll('.cursor-dot, .cursor-glow').forEach(el => el.remove());
        const cc = document.getElementById('cursorTrailCanvas');
        if (cc) { const ctx2 = cc.getContext('2d'); ctx2.clearRect(0, 0, cc.width, cc.height); }

        color = color || '#9b59b6';
        if (type === true) type = 'dots';
        if (!type || type === false) return;
        trailDuration = (typeof trailDuration === 'number' && trailDuration > 0) ? trailDuration : null;

        _cursorAbort = new AbortController();
        const sig = _cursorAbort.signal;

        if (type === 'dots') {
        let _dotLastT = 0;
        document.addEventListener('mousemove', e => {
        const now = Date.now();
        if (now - _dotLastT < 16) return;
        _dotLastT = now;
        const d = document.createElement('div');
        d.className = 'cursor-dot';
        d.style.cssText = `left:${e.clientX}px;top:${e.clientY}px;background:${color};box-shadow:0 0 6px ${color}`;
        document.body.appendChild(d);
        var dotLife = trailDuration ? trailDuration * 1000 : 500;
        setTimeout(() => { d.style.opacity='0'; setTimeout(()=>d.remove(),400); }, Math.max(dotLife - 400, 10));
        }, { signal: sig });
        } else if (type === 'glow') {
        let lastT = 0;
        document.addEventListener('mousemove', e => {
        const now = Date.now();
        if (now - lastT < 30) return;
        lastT = now;
        const d = document.createElement('div');
        d.className = 'cursor-glow';
        const size = 14 + Math.random() * 8;
        d.style.cssText = `left:${e.clientX - size/2}px;top:${e.clientY - size/2}px;width:${size}px;height:${size}px;background:radial-gradient(circle,${color} 0%,transparent 70%);box-shadow:0 0 ${size}px ${color},0 0 ${size*2}px ${color}`;
        document.body.appendChild(d);
        var glowLife = trailDuration ? trailDuration * 1000 : 660;
        setTimeout(() => { d.style.opacity='0'; d.style.transform='scale(1.8)'; setTimeout(()=>d.remove(),600); }, Math.max(glowLife - 600, 10));
        }, { signal: sig });
        } else if (type === 'lightning') {
        const positions = [];
        document.addEventListener('mousemove', e => {
        positions.push({ x: e.clientX, y: e.clientY, t: Date.now() });
        if (positions.length > 6) positions.shift();
        if (positions.length < 2) return;
        const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
        svg.setAttribute('width', window.innerWidth);
        svg.setAttribute('height', window.innerHeight);
        svg.style.cssText = 'position:fixed;top:0;left:0;pointer-events:none;z-index:9999;overflow:visible;';
        let d = `M ${positions[0].x} ${positions[0].y}`;
        for (let i = 1; i < positions.length; i++) {
        const jx = (Math.random()-0.5)*12, jy = (Math.random()-0.5)*12;
        const mx = (positions[i-1].x+positions[i].x)/2+jx;
        const my = (positions[i-1].y+positions[i].y)/2+jy;
        d += ` Q ${mx} ${my} ${positions[i].x} ${positions[i].y}`;
        }
        svg.innerHTML = `<path d="${d}" fill="none" stroke="${color}" stroke-width="2" opacity="0.8" filter="url(#lglow)"/><path d="${d}" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.6"/><defs><filter id="lglow"><feGaussianBlur stdDeviation="3" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>`;
        document.body.appendChild(svg);
        var boltLife = trailDuration ? trailDuration * 1000 : 230;
        setTimeout(() => { svg.style.opacity='0'; svg.style.transition='opacity 0.15s'; setTimeout(()=>svg.remove(),150); }, Math.max(boltLife - 150, 10));
        }, { signal: sig });
        } else if (type === 'comet') {
        const trail = [];
        const maxLen = trailDuration ? Math.max(5, Math.round(trailDuration * 30)) : 22;
        const canvas = document.getElementById('cursorTrailCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        _cometResizeAbort = new AbortController();
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }, { signal: _cometResizeAbort.signal });
        document.addEventListener('mousemove', e => {
        trail.push({ x: e.clientX, y: e.clientY });
        if (trail.length > maxLen) trail.shift();
        }, { signal: sig });
        document.addEventListener('mousemove', () => { trail._moving = true; }, { signal: sig });
        const rgb = hexToRgb(color);
        (function draw() {
        if (document.hidden) { _cursorRafId = requestAnimationFrame(draw); return; }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (trail.length > 2) {
        for (let i = 1; i < trail.length; i++) {
        const t = i / trail.length;
        ctx.beginPath();
        ctx.moveTo(trail[i-1].x, trail[i-1].y);
        ctx.lineTo(trail[i].x, trail[i].y);
        ctx.strokeStyle = `rgba(${rgb},${t * 0.8})`;
        ctx.lineWidth = t * 5;
        ctx.lineCap = 'round';
        ctx.stroke();
        }
        const head = trail[trail.length-1];
        const gr = ctx.createRadialGradient(head.x, head.y, 0, head.x, head.y, 12);
        gr.addColorStop(0, `rgba(${rgb},0.5)`);
        gr.addColorStop(1, `rgba(${rgb},0)`);
        ctx.fillStyle = gr;
        ctx.beginPath();
        ctx.arc(head.x, head.y, 12, 0, Math.PI*2);
        ctx.fill();
        }
        if (trail.length > 0 && !trail._moving) {
        trail._decayCounter = (trail._decayCounter || 0) + 1;
        if (trail._decayCounter > 3) { trail.shift(); trail._decayCounter = 0; }
        }
        trail._moving = false;
        _cursorRafId = requestAnimationFrame(draw);
        })();
        }
        }

        /* ── Discord Presence ── */
        async function fetchPresence(id) {
        try { const r = await fetch(`/_api/presence/${id}`); return r.ok ? (await r.json()).data : null; } catch { return null; }
        }
        function statusClass(s) { return {online:'online',idle:'idle',dnd:'dnd'}[s]||'offline'; }

        function resolveActivityAsset(appId, assetStr) {
        if (!assetStr) return '';
        if (assetStr.startsWith('mp:external/')) return 'https://media.discordapp.net/external/' + assetStr.slice(12);
        if (assetStr.startsWith('spotify:')) return '';
        if (/^\d+$/.test(assetStr) && appId) return `https://cdn.discordapp.com/app-assets/${appId}/${assetStr}.png`;
        return '';
        }

        function formatElapsed(startMs) {
        const diff = Date.now() - startMs;
        if (diff < 0) return '00:00';
        const secs = Math.floor(diff / 1000);
        const h = Math.floor(secs / 3600);
        const m = Math.floor((secs % 3600) / 60);
        const s = secs % 60;
        const pad = n => String(n).padStart(2, '0');
        return h > 0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
        }

        function formatMs(ms) {
        const secs = Math.floor(ms / 1000);
        const m = Math.floor(secs / 60);
        const s = secs % 60;
        return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function buildWidgetActivities(activities) {
        if (!activities || !activities.length) return '';
        const labels = {0:'Playing',1:'Streaming',2:'Listening to',3:'Watching'};
        let html = '';
        for (const a of activities) {
        if (a.type === 4) continue;
        const label = labels[a.type] || 'Playing';
        const largeUrl = resolveActivityAsset(a.application_id, a.assets && a.assets.large_image);
        const smallUrl = resolveActivityAsset(a.application_id, a.assets && a.assets.small_image);
        const dcdnUrl = a.application_id ? `https://dcdn.dstn.to/app-icons/${a.application_id}.png?size=64` : '';
        const iconSrc = largeUrl || dcdnUrl;
        let iconHtml = '';
        if (iconSrc) {
        const fb = dcdnUrl && largeUrl ? ` onerror="this.onerror=null;this.src='${esc(dcdnUrl)}'"` : '';
        iconHtml = `<div class="widget-activity-icon-wrap"><img class="widget-activity-icon" src="${esc(iconSrc)}" alt=""${fb}>${smallUrl ? `<img class="widget-activity-small-icon" src="${esc(smallUrl)}" alt="" onerror="this.style.display='none'">` : ''}</div>`;
        }
        const detailsHtml = a.details ? `<div class="widget-activity-detail">${esc(a.details)}</div>` : '';
        const stateHtml = a.state ? `<div class="widget-activity-detail">${esc(a.state)}</div>` : '';
        const albumHtml = a.assets && a.assets.large_text ? `<div class="widget-activity-detail">${esc(a.assets.large_text)}</div>` : '';
        let timeHtml = '';
        if (a.timestamps && a.timestamps.start && a.timestamps.end) {
        const elapsed = Date.now() - a.timestamps.start;
        const total = a.timestamps.end - a.timestamps.start;
        const pct = Math.min(100, Math.max(0, (elapsed / total) * 100));
        timeHtml = `<div class="widget-activity-time" data-start="${a.timestamps.start}" data-end="${a.timestamps.end}"><span class="widget-act-elapsed">${formatMs(Math.max(0, elapsed))}</span><div class="widget-activity-bar"><div class="widget-activity-bar-fill" style="width:${pct.toFixed(1)}%"></div></div><span>${formatMs(total)}</span></div>`;
        } else if (a.timestamps && a.timestamps.start) {
        timeHtml = `<div class="widget-activity-time"><span class="widget-act-game-elapsed" data-start="${a.timestamps.start}">${formatElapsed(a.timestamps.start)}</span> elapsed</div>`;
        }
        html += `<div class="widget-activity">
        ${iconHtml}
        <div class="widget-activity-info">
        <div class="widget-activity-label">${esc(label)}${a.type !== 2 ? ' ' + esc(a.name) : ''}</div>
        ${a.type === 2 ? `<div class="widget-activity-name">${esc(a.details || a.name)}</div>` : ''}
        ${a.type === 2 ? stateHtml + albumHtml : detailsHtml + stateHtml}
        ${timeHtml}
        </div>
        </div>`;
        }
        return html;
        }

        async function fetchGithubContributions(username) {
        try {
        const r = await fetch(`/_api/github/${encodeURIComponent(username)}/contributions?_=${Math.floor(Date.now()/3600000)}`);
        if (!r.ok) return null;
        return await r.json();
        } catch { return null; }
        }

        function buildGithubGraph(data) {
        if (!data || !data.days || !data.days.length) return `<div class="widget-gh-empty">No contribution data</div>`;
        const allDays = data.days.slice().sort((a, b) => a.date.localeCompare(b.date));
        const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 182);
        const cutoffStr = cutoff.toISOString().slice(0, 10);
        const days = allDays.filter(d => d.date >= cutoffStr);
        if (!days.length) return `<div class="widget-gh-empty">No recent contributions</div>`;
        const mNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const weeks = [];
        let week = [];
        const firstDay = new Date(days[0].date);
        const pad = firstDay.getUTCDay();
        for (let i = 0; i < pad; i++) week.push(null);
        for (const d of days) {
        week.push(d);
        if (week.length === 7) { weeks.push(week); week = []; }
        }
        if (week.length) { while (week.length < 7) week.push(null); weeks.push(week); }

        // Month labels positioned by week index
        const months = [];
        let lastMonth = -1;
        for (let wi = 0; wi < weeks.length; wi++) {
        const fd = weeks[wi].find(d => d);
        if (fd) {
        const m = new Date(fd.date).getUTCMonth();
        if (m !== lastMonth) { months.push({ wi, name: mNames[m] }); lastMonth = m; }
        }
        }
        const totalWeeks = weeks.length;
        let monthsHtml = months.map((m, i) => {
        const pct = (m.wi / totalWeeks) * 100;
        return `<span style="position:absolute;left:${pct}%">${m.name}</span>`;
        }).join('');

        function setupMusic(song, playerStyle, widgetCls) {

        url:    t.url    || '',

        /* ── Audio Analyser & Visualiser ── */
        // Pre-warm AudioContext (call inside user gesture). Does NOT connect source.
        function warmAudioCtx() {
        if (_audioCtx) return;

        _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch {}

        // Connect the analyser source ONLY when AudioContext is confirmed running.
        // createMediaElementSource permanently reroutes <audio> output through AudioContext.
        // If context is suspended when this happens, audio goes completely silent.
        function ensureAnalyser() {

        // (mobile browsers can re-suspend it after a period of silence)
        if (_audioCtx && _audioCtx.state === 'suspended') {
        _audioCtx.resume().catch(() => {});

        return true;

        if (!_audioCtx) warmAudioCtx();
        if (!_audioCtx) return false;
        // Resume if suspended
        if (_audioCtx.state === 'suspended') {
        _audioCtx.resume().catch(() => {});
        return false; // Not ready yet — audio keeps playing through normal <audio> path
        }
        if (_audioCtx.state !== 'running') return false;
        try {
        _analyser = _audioCtx.createAnalyser();
        _analyser.fftSize = 128;
        _analyser.smoothingTimeConstant = 0.82;

        // Time domain shows actual waveform peaks which drop between kicks,
        // unlike frequency domain which stays flat during sustained bass.
        _bassFilter = _audioCtx.createBiquadFilter();
        _bassFilter.type = 'lowpass';
        _bassFilter.frequency.value = 150;
        _bassFilter.Q.value = 0.7;
        _bassAnalyser = _audioCtx.createAnalyser();
        _bassAnalyser.fftSize = 128;
        _bassAnalyser.smoothingTimeConstant = 0;
        _analyserSource = _audioCtx.createMediaElementSource(audioEl);
        _analyserSource.connect(_analyser);
        _analyserSource.connect(_bassFilter);
        _bassFilter.connect(_bassAnalyser);
        // Don't connect _bassAnalyser to destination — it's analysis-only
        _analyser.connect(_audioCtx.destination);
        _freqData = new Uint8Array(_analyser.frequencyBinCount);
        _bassTimeData = new Uint8Array(_bassAnalyser.fftSize);
        return true;
        } catch (e) {
        console.warn('Visualiser: could not create AudioContext', e);
        return false;
        }
        }

        function updateVisState() {

        const canvas = _visCardCanvas;
        const profileVis = _visProfileCanvas;
        const expanded = player.classList.contains('expanded');

        function optimizeImageUrl(url, width) {

        const u = new URL(url);
